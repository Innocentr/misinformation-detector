name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -e .[dev]
        env:
          SECRET_KEY: ci-test-secret-key-12345

      - name: Run Ruff
        run: python -m ruff check backend pyproject.toml
        env:
          SECRET_KEY: ci-test-secret-key-12345

      - name: Run tests
        run: python -m pytest backend/tests
        env:
          SECRET_KEY: ci-test-secret-key-12345
